# CyfyClaw — Nginx reverse proxy (Ubuntu VPS).
# Serves the frontend and proxies /api + /health to the backend on one origin,
# which avoids CORS entirely. Terminate TLS here (see certbot notes in README).
#
# Place at: /etc/nginx/sites-available/cyfyclaw.conf
# Enable:   ln -s /etc/nginx/sites-available/cyfyclaw.conf /etc/nginx/sites-enabled/
# Test:     nginx -t && systemctl reload nginx

upstream cyfyclaw_backend {
    server 127.0.0.1:8000;
}

upstream cyfyclaw_frontend {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name your-domain.example.com;

    # --- Redirect to HTTPS once certificates are installed (uncomment) ---
    # return 301 https://$host$request_uri;

    # For the initial certbot HTTP-01 challenge, keep port 80 serving:
    location / {
        proxy_pass http://cyfyclaw_frontend;
        include /etc/nginx/proxy_params;
    }

    location ~ ^/(api|health) {
        proxy_pass http://cyfyclaw_backend;
        include /etc/nginx/proxy_params;

        # Streaming (Server-Sent Events) — disable buffering so tokens flush.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
    }
}

